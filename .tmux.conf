# Prefix: Ctrl-a (easier reach than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color and 256-color support
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:RGB"

# Mouse support (click panes, scroll, resize)
set -g mouse on

# Vi-style keys in copy mode
setw -g mode-keys vi

# Scrollback buffer
set -g history-limit 10000

# Base index 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Splits — all open in current directory
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key \\ split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Faster escape (responsive vim/neovim)
set -s escape-time 0

# Auto-rename windows to current directory basename
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"
set -g allow-rename off

# Unbind old Colemak pane nav (use Ctrl-A ←↓↑→ for pane navigation)
unbind n
unbind e
unbind u
unbind i
bind n next-window

# Reload config binding
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ── Continuum / Resurrect ──────────────────────────────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Catppuccin ────────────────────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"

# Status bar layout
set -g status-position bottom
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}'

# ── sesh session picker (Prefix + T) ─────────────────────────────────────────
bind-key T display-popup -E -w 55% -h 60% "sesh connect \$(sesh list | fzf)"

# ── TPM — must be last line ───────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# Override Catppuccin's low-contrast selection highlight (surface_0 is too close to bg)
set -g mode-style "bg=#89b4fa,fg=#1e1e2e,bold"
